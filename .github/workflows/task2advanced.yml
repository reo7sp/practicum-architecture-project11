name: task2advanced

on:
  pull_request:
    paths:
      - "Task2Advanced/**"
      - "Task1Advanced/modules/vm/**"
      - ".github/workflows/task2advanced.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply"
        required: true
        default: "false"

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Task2Advanced
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: terraform fmt
        run: terraform fmt -check -recursive

      - name: terraform init
        run: terraform init -backend=false -input=false

      - name: terraform validate
        run: terraform validate

  deploy:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Task2Advanced
    env:
      TF_VAR_cloud_id: ${{ secrets.TF_VAR_cloud_id }}
      TF_VAR_folder_id: ${{ secrets.TF_VAR_folder_id }}
      TF_VAR_token: ${{ secrets.TF_VAR_token }}
      TF_VAR_vm_zone: ${{ secrets.TF_VAR_vm_zone }}
      TF_VAR_vm_platform_id: ${{ secrets.TF_VAR_vm_platform_id }}
      TF_VAR_network_subnet_id: ${{ secrets.TF_VAR_network_subnet_id }}
      TF_VAR_boot_disk_image_id: ${{ secrets.TF_VAR_boot_disk_image_id }}
      TF_VAR_vm_name: ${{ secrets.TF_VAR_vm_name }}
      TF_VAR_vm_cores: ${{ secrets.TF_VAR_vm_cores }}
      TF_VAR_vm_memory: ${{ secrets.TF_VAR_vm_memory }}
      TF_VAR_vm_core_fraction: ${{ secrets.TF_VAR_vm_core_fraction }}
      TF_VAR_boot_disk_size: ${{ secrets.TF_VAR_boot_disk_size }}
      TF_VAR_boot_disk_type: ${{ secrets.TF_VAR_boot_disk_type }}
      TF_VAR_data_disk_name: ${{ secrets.TF_VAR_data_disk_name }}
      TF_VAR_data_disk_size: ${{ secrets.TF_VAR_data_disk_size }}
      TF_VAR_data_disk_type: ${{ secrets.TF_VAR_data_disk_type }}
      TF_VAR_network_assign_public_ip: ${{ secrets.TF_VAR_network_assign_public_ip }}
      TF_VAR_ssh_user: ${{ secrets.TF_VAR_ssh_user }}
      TF_VAR_ssh_public_key: ${{ secrets.TF_VAR_ssh_public_key }}
      TF_BACKEND_BUCKET: ${{ secrets.TF_BACKEND_BUCKET }}
      TF_BACKEND_KEY: ${{ secrets.TF_BACKEND_KEY }}
      TF_BACKEND_REGION: ${{ secrets.TF_BACKEND_REGION }}
      TF_BACKEND_ENDPOINT: ${{ secrets.TF_BACKEND_ENDPOINT }}
      TF_BACKEND_ACCESS_KEY: ${{ secrets.TF_BACKEND_ACCESS_KEY }}
      TF_BACKEND_SECRET_KEY: ${{ secrets.TF_BACKEND_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=$TF_BACKEND_BUCKET" \
            -backend-config="key=$TF_BACKEND_KEY" \
            -backend-config="region=$TF_BACKEND_REGION" \
            -backend-config="endpoints.s3=$TF_BACKEND_ENDPOINT" \
            -backend-config="access_key=$TF_BACKEND_ACCESS_KEY" \
            -backend-config="secret_key=$TF_BACKEND_SECRET_KEY" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_requesting_account_id=true" \
            -backend-config="use_path_style=true"

      - name: terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: terraform apply
        if: github.event.inputs.apply == 'true'
        run: terraform apply -input=false -auto-approve tfplan
